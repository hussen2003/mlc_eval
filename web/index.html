<!DOCTYPE html>
<html>
  <head>
    <title>WebLLM Benchmarker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h2>Step 1: Select and Load Model</h2>
    <div class="download-container">
      <select id="model-selection"></select>
      <button id="download">Load Model</button>
    </div>
    <p id="download-status" class="hidden"></p>

    <h2>Step 2: Benchmark Chat</h2>
    <div class="chat-container">
      <div id="chat-box" class="chat-box"></div>
      <div id="chat-stats" class="chat-stats hidden"></div>
      <div class="chat-input-container">
        <input type="text" id="user-input" placeholder="Type your benchmark prompt..." />
        <button id="send" disabled>Send</button>
      </div>
    </div>

    <h2>Step 3: Benchmark Results</h2>
    <table id="benchmark-table">
      <thead>
        <tr>
          <th>Model</th>
          <th>Prompt</th>
          <th>Response</th>
          <th>TTFT (Seconds)</th>
          <th>TPS (Tokens/Sec)</th>
        </tr>
      </thead>
      <tbody>
        </tbody>
    </table>

    <script src="./index.js" type="module"></script>
  </body>
</html>
